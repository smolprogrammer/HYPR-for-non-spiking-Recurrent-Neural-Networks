# @package _global_

defaults:
  - _self_
  - override /model: brf
  - override /dataset: scifar
  - override /lr_scheduler: cosine_300ep
  - override /optimizer: adam

experiment_name: brf_scifar_hypr

model:
  hidden_size: 1024
  hidden_layer_hyperparams:
    omega_range: [15.0, 50.0]
    b_range: [0.0001, 0.1]
    use_exponential: false
    surrogate_gradient: slayer

training:
  hypr: true
  learning_rate: 0.02
  grad_clip_val: 1.0
  loss_aggregation: per_timestep_cross_entropy
  prediction_mode: mean_over_sequence
  epochs: 300

hypr_args:
  num_chunks: 1

dataset:
  color: true
  batch_size: 128
  ignore_first_n_timesteps: 300
