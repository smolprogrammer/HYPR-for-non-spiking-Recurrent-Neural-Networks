# @package _global_

defaults:
  - _self_
  - override /model: lstm
  - override /dataset: shd_4ms_140
  - override /lr_scheduler: constant
  - override /optimizer: adam

experiment_name: lstm_shd_hypr

model:
  hidden_size: 256
  num_layers: 2
  output_layer_params:
    tau_u_range: [50, 300] 
    interpolation_tau: false

training:
  hypr: true
  learning_rate: 0.001
  grad_clip_val: 5.0
  loss_aggregation: sum_of_softmax
  prediction_mode: sum_of_softmax
  epochs: 20

dataset:
  batch_size: 128
  ignore_first_n_timesteps: 0
