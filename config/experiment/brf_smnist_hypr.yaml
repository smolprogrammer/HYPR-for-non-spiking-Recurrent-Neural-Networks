# @package _global_

defaults:
  - _self_
  - override /model: brf
  - override /dataset: smnist
  - override /lr_scheduler: linear300ep
  - override /optimizer: adam

experiment_name: brf_smnist_hypr

model:
  hidden_size: 256
  hidden_layer_hyperparams:
    omega_range: [15.0, 50.0]
    b_range: [0.1, 1.0]
    use_exponential: false

training:
  hypr: true
  learning_rate: 0.01
  grad_clip_val: 1.0
  loss_aggregation: per_timestep_cross_entropy 
  prediction_mode: mean_over_sequence
  epochs: 300

hypr_args:
  num_chunks: 1
  
dataset:
  batch_size: 256
  ignore_first_n_timesteps: 500
